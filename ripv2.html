<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no,viewport-fit=cover">
<title>مُصمم النعي الاحترافي</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/themes/dark.css">
<script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
<script src="https://cdn.jsdelivr.net/npm/flatpickr/dist/l10n/ar.js"></script>
<style>
@font-face{font-family:'F0';src:url('https://files.catbox.moe/hmey7o.ttf')}
@font-face{font-family:'F1';src:url('https://files.catbox.moe/d9po9c.ttf')}
@font-face{font-family:'F3';src:url('https://files.catbox.moe/fw3p02.ttf')}
@font-face{font-family:'F4';src:url('https://files.catbox.moe/f92hlr.otf')}
@font-face{font-family:'F5';src:url('https://files.catbox.moe/6342to.otf')}
@font-face{font-family:'F6';src:url('https://files.catbox.moe/rcde9s.ttf')}
:root{
  --gold:#c9a84c;--gold2:#f0d080;--bg:#0b0b0e;--panel:#13131a;
  --border:#222230;--accent:#3a7bd5;--green:#27ae60;--red:#c0392b;
  --text:#e8e8f0;--sub:#888899;--radius:10px;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;margin:0;padding:0;outline:none}
body{font-family:'F0',sans-serif;background:var(--bg);color:var(--text);
  height:100dvh;display:flex;flex-direction:column;overflow:hidden}

/* ── Canvas area ── */
.vp{flex:1;display:flex;justify-content:center;align-items:center;
  background:radial-gradient(ellipse at center,#161620 0%,#0a0a0e 100%);
  overflow:hidden;position:relative;min-height:0}
#sw{position:relative;width:1083px;height:1500px;transform-origin:center}
#dc{width:1083px;height:1500px;background:#000;position:relative;overflow:hidden}
.layer{position:absolute;top:0;left:0;width:100%;height:100%}
#base-bg{z-index:1;background-size:cover;background-position:center}
#base-bg-canvas{position:absolute;top:0;left:0;width:100%;height:100%;z-index:2;display:none}
#photo-layer{position:absolute;z-index:5;background-size:cover;background-position:center;display:none}
#overlay-img{z-index:10;pointer-events:none}
#overlay-duplicates{position:absolute;inset:0;z-index:11;pointer-events:none}
.wm{position:absolute;z-index:30;opacity:.88;display:none;pointer-events:none}
#wm-app{top:40px;right:40px;width:150px}
#wm-yearly{top:40px;right:40px;width:150px}
#name-box-bg{position:absolute;z-index:18;display:none;
  background:linear-gradient(180deg,#2a2a2a,#000);border:1.5px solid #444;
  border-radius:14px;left:50%;transform:translateX(-50%)}
.tel{position:absolute;width:1050px;left:50%;transform:translateX(-50%);
  text-align:center;color:#fff;z-index:20;
  text-shadow:0 4px 24px rgba(0,0,0,.95);white-space:nowrap;
  outline:none;display:flex;align-items:center;justify-content:center}
#custom-img-el{position:absolute;z-index:15;display:none;pointer-events:none;object-fit:contain}

/* ── Tab bar ── */
.tabbar{
  background:var(--panel);border-top:1px solid var(--border);
  display:flex;flex-shrink:0;overflow-x:auto;scrollbar-width:none;
  padding:0 4px;gap:2px;
}
.tabbar::-webkit-scrollbar{display:none}
.tb{flex-shrink:0;display:flex;flex-direction:column;align-items:center;
  gap:2px;padding:7px 10px 5px;border:none;background:transparent;
  color:var(--sub);font-family:inherit;font-size:9px;cursor:pointer;
  border-bottom:2px solid transparent;min-width:54px;transition:.15s}
.tb.on{color:var(--gold);border-bottom-color:var(--gold)}
.tb .ic{font-size:17px;line-height:1}

/* ── Panel ── */
.panel{background:var(--panel);overflow-y:auto;max-height:44vh;
  scrollbar-width:none;flex-shrink:0;padding:10px 10px 12px}
.panel::-webkit-scrollbar{display:none}
.pg{display:none}.pg.on{display:block}

/* ── Save bar ── */
.savebar{
  background:var(--panel);border-top:1px solid var(--border);
  display:flex;gap:6px;padding:7px 10px;flex-shrink:0;
}
.btn-save{
  flex:4;background:linear-gradient(135deg,#1a6b3a,#27ae60);
  color:#fff;border:none;border-radius:var(--radius);padding:12px;
  font-family:inherit;font-size:13px;font-weight:bold;cursor:pointer;
}
.btn-fs{
  flex:1;background:#1e1e28;border:1px solid var(--border);color:var(--sub);
  border-radius:var(--radius);font-size:18px;cursor:pointer;
}

/* ── Controls ── */
.row{display:flex;gap:5px;margin-bottom:7px;align-items:center;flex-wrap:wrap}
.btn{
  background:#1e1e28;border:1px solid var(--border);color:var(--text);
  padding:9px 6px;border-radius:var(--radius);font-family:inherit;
  font-size:11px;cursor:pointer;flex:1;min-width:60px;text-align:center;
  transition:.15s;
}
.btn:active{background:#2a2a3a}
.bx{font-size:10px;padding:7px 5px}
.bgold{background:linear-gradient(135deg,#8a6500,#c9a84c)!important;color:#000!important;font-weight:bold}
.bpurp{background:#3d1a6e!important;border-color:#5a2a9e!important}
.bblue{background:#0d2a5c!important;border-color:#1a4a9e!important}
.bred{background:#4a1010!important;border-color:#8a2020!important}
.bgreen{background:#0d3a1a!important;border-color:#1a6a2a!important}
.bdark{background:#111118!important;border-color:#888!important}
.bcopy{
  background:#111118;color:var(--gold);border:1px solid var(--border);
  padding:12px 4px;border-radius:var(--radius);cursor:pointer;
  font-family:inherit;font-size:11px;text-align:center;
}

/* D-pad */
.dpad{display:grid;grid-template-columns:repeat(3,30px);grid-template-rows:repeat(3,30px);gap:2px}
.dp{background:#1e1e28;border:1px solid var(--border);color:var(--text);
  border-radius:6px;font-size:11px;cursor:pointer;display:flex;
  align-items:center;justify-content:center;width:30px;height:30px}
.dp:active,.zb:active{background:var(--gold);color:#000}
.dc{background:#0b0b0e;border:1px solid #333;border-radius:50%;
  display:flex;align-items:center;justify-content:center;font-size:14px;color:#444}
.zb{width:30px;height:30px;background:#1e1e28;border:1px solid var(--border);
  color:var(--text);border-radius:6px;font-size:15px;font-weight:bold;cursor:pointer;
  display:flex;align-items:center;justify-content:center}

/* Chips */
.chips{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:8px}
.chip{background:#1e1e28;border:1.5px solid var(--border);border-radius:20px;
  padding:5px 10px;cursor:pointer;font-size:10px;white-space:nowrap}
.chip input{display:none}
.chip:has(input:checked){background:var(--gold);color:#000;border-color:var(--gold);font-weight:bold}

/* Slider */
.slrow{display:flex;align-items:center;gap:7px;margin-bottom:8px}
.sllabel{font-size:10px;color:var(--sub);white-space:nowrap;min-width:50px}
.slrow input[type=range]{flex:1;accent-color:var(--gold)}
.slval{font-size:10px;color:var(--text);min-width:30px}

/* Swatches */
.swrow{display:flex;gap:5px;flex-wrap:wrap}
.sw{height:22px;flex:1;min-width:24px;border:1.5px solid #444;border-radius:5px;cursor:pointer}

/* Card */
.card{background:#0f0f18;border:1px solid var(--border);border-radius:var(--radius);padding:9px;margin-top:6px}
.card-title{font-size:10px;color:var(--gold);font-weight:bold;margin-bottom:7px}

/* WM setup prompt */
.wm-prompt{background:#111118;border:1px dashed #c9a84c55;border-radius:var(--radius);
  padding:10px;text-align:center;margin-bottom:7px;font-size:11px;color:var(--sub)}
.wm-prompt strong{color:var(--gold)}

/* ios fullscreen */
.ifs{position:fixed!important;inset:0!important;z-index:9999!important}
.ifb{overflow:hidden!important}
</style>
</head>
<body>

<div class="vp">
  <div id="sw">
    <div id="dc">
      <div id="base-bg" class="layer"></div>
      <canvas id="base-bg-canvas"></canvas>
      <div id="photo-layer"></div>
      <div id="name-box-bg"></div>
      <!-- Watermarks as img — rendered and saved correctly -->
      <img id="wm-app" class="wm" crossorigin="anonymous"
        src="https://i.ibb.co/KcpkBHJ0/Wfyat.png"
        style="position:absolute;z-index:30;top:40px;right:40px;width:150px;display:none;pointer-events:none">
      <img id="wm-yearly" class="wm" crossorigin="anonymous"
        src="https://i.ibb.co/Bk2k79h/Zekra.png"
        style="position:absolute;z-index:30;top:40px;right:40px;width:150px;display:none;pointer-events:none">
      <img id="overlay-img" class="layer" src="https://i.ibb.co/MkHjQ6yN/sketch1760195853528.png">
      <div id="overlay-duplicates"></div>
      <img id="custom-img-el">
      <div id="txt-name" class="tel" contenteditable="true" spellcheck="false">اسم الفقيد</div>
      <div id="txt-date" class="tel">اختر التاريخ</div>
      <div id="txt-hijri" class="tel"></div>
      <div id="txt-date2" class="tel" style="display:none">اختر التاريخ الثاني</div>
      <div id="txt-hijri2" class="tel" style="display:none"></div>
    </div>
  </div>
</div>

<!-- Tab bar -->
<div class="tabbar">
  <button class="tb on" onclick="showTab('pg-tpl',this)"><span class="ic">🖼</span>قوالب</button>
  <button class="tb" onclick="showTab('pg-move',this)"><span class="ic">🕹</span>تحريك</button>
  <button class="tb" onclick="showTab('pg-text',this)"><span class="ic">✏️</span>نص</button>
  <button class="tb" onclick="showTab('pg-wm',this)"><span class="ic">🏷</span>شعارات</button>
  <button class="tb" onclick="showTab('pg-fx',this)"><span class="ic">🎨</span>فلتر</button>
  <button class="tb" onclick="showTab('pg-copy',this)"><span class="ic">📋</span>نسخ</button>
</div>

<!-- Panel -->
<div class="panel">

  <!-- ① قوالب -->
  <div id="pg-tpl" class="pg on">
    <div class="row">
      <button class="btn bgold" onclick="setMode('gold')">إطار ذهبي</button>
      <button class="btn bblue" onclick="setMode('quran')">قرآن كريم</button>
    </div>
    <div class="row">
      <button class="btn bpurp" onclick="setMode('man')">صورة رجل</button>
      <button class="btn bpurp" onclick="setMode('woman')">صورة امرأة</button>
    </div>
    <div class="row">
      <label class="btn bpurp" style="cursor:pointer">📷 حداد<input type="file" hidden onchange="upFullBg(event,'hidad')"></label>
      <label class="btn bblue" style="cursor:pointer">📷 ذكرى<input type="file" hidden onchange="upFullBg(event,'zekra')"></label>
    </div>
    <div class="card">
      <div class="card-title">✂ إزالة خلفية الصورة</div>
      <div class="slrow">
        <span class="sllabel">رنج الأبيض</span>
        <input type="range" id="bg-remove-range" min="150" max="255" value="220"
          oninput="document.getElementById('brv').innerText=this.value">
        <span class="slval" id="brv">220</span>
      </div>
      <div class="row">
        <button class="btn bgreen bx" onclick="enhanceFullBg()">✨ إزالة ذكية</button>
        <button class="btn bblue bx" onclick="removeBgFullImg()">✂ يدوي</button>
        <button class="btn bred bx" onclick="resetFullBg()">↺ استعادة</button>
      </div>
      <div style="font-size:10px;color:var(--sub);margin-bottom:5px">لون خلفية التصميم:</div>
      <div class="swrow">
        <button class="sw" style="background:#fff" onclick="setBgColor('#fff')"></button>
        <button class="sw" style="background:#d4d4d4" onclick="setBgColor('#d4d4d4')"></button>
        <button class="sw" style="background:#888" onclick="setBgColor('#888')"></button>
        <button class="sw" style="background:#444" onclick="setBgColor('#444')"></button>
        <button class="sw" style="background:#1a1a1a" onclick="setBgColor('#1a1a1a')"></button>
        <button class="sw" style="background:#000;border-color:#555" onclick="setBgColor('#000')"></button>
      </div>
    </div>
    <div class="card">
      <div class="card-title">🔁 تكرار طبقة القالب</div>
      <div class="row">
        <button class="btn bx" onclick="duplicateOverlay()">+ تكرار</button>
        <button class="btn bred bx" onclick="removeLastDuplicate()">− حذف آخر</button>
      </div>
      <div class="slrow">
        <span class="sllabel">شفافية</span>
        <input type="range" min="0" max="100" value="100" oninput="setOverlayOpacity(this.value)">
        <span class="slval" id="ov-op-val">100%</span>
      </div>
    </div>
  </div>

  <!-- ② تحريك -->
  <div id="pg-move" class="pg">
    <div class="chips" id="target-chips">
      <label class="chip"><input type="radio" name="tgt" value="name" checked onchange="setTarget(this.value)"><span>الاسم</span></label>
      <label class="chip"><input type="radio" name="tgt" value="date" onchange="setTarget(this.value)"><span>التاريخ</span></label>
      <label class="chip"><input type="radio" name="tgt" value="photo" onchange="setTarget(this.value)"><span>الصورة</span></label>
      <label class="chip"><input type="radio" name="tgt" value="bg" onchange="setTarget(this.value)"><span>الخلفية</span></label>
      <label class="chip"><input type="radio" name="tgt" value="ci" onchange="setTarget(this.value)"><span>صورة+</span></label>
      <label class="chip"><input type="radio" name="tgt" value="wm1" onchange="setTarget(this.value)"><span>شعار1</span></label>
      <label class="chip"><input type="radio" name="tgt" value="wm2" onchange="setTarget(this.value)"><span>شعار2</span></label>
      <label class="chip"><input type="radio" name="tgt" value="date2" onchange="setTarget(this.value)"><span>تاريخ2</span></label>
    </div>
    <div style="display:flex;gap:10px;align-items:flex-start">
      <div>
        <div class="dpad">
          <button class="dp"></button>
          <button class="dp" onclick="mvEl(0,-30)">▲</button>
          <button class="dp"></button>
          <button class="dp" onclick="mvEl(-30,0)">◀</button>
          <div class="dc">✛</div>
          <button class="dp" onclick="mvEl(30,0)">▶</button>
          <button class="dp"></button>
          <button class="dp" onclick="mvEl(0,30)">▼</button>
          <button class="dp"></button>
        </div>
        <div style="display:flex;gap:2px;margin-top:3px">
          <button class="zb" style="background:var(--accent)" onclick="zmEl(10)">+</button>
          <button class="zb" style="background:#2a2a3a" onclick="zmEl(-10)">−</button>
        </div>
      </div>
      <div style="flex:1">
        <div class="row">
          <label class="btn bpurp bx" style="cursor:pointer">📷 رفع صورة+<input type="file" hidden accept="image/*" onchange="upCI(event)"></label>
          <button class="btn bred bx" onclick="delCI()">🗑</button>
          <button class="btn bblue bx" onclick="removeBgCI()">✂BG</button>
        </div>
        <div class="row">
          <button class="btn bx" onclick="setBlend('normal')">عادي</button>
          <button class="btn bblue bx" onclick="setBlend('screen')">Screen</button>
          <button class="btn bpurp bx" onclick="setBlend('multiply')">Multiply</button>
          <button class="btn bgreen bx" onclick="invCI()">Invert</button>
        </div>
      </div>
    </div>
  </div>

  <!-- ③ نص -->
  <div id="pg-text" class="pg">
    <div class="row" style="justify-content:space-around">
      <div style="text-align:center">
        <div style="font-size:10px;color:var(--sub);margin-bottom:4px">حجم الاسم</div>
        <div style="display:flex;gap:3px">
          <button class="zb" style="background:var(--accent)" onclick="chFS('name',10)">+</button>
          <button class="zb" style="background:#2a2a3a" onclick="chFS('name',-10)">−</button>
        </div>
      </div>
      <div style="text-align:center">
        <div style="font-size:10px;color:var(--sub);margin-bottom:4px">حجم التاريخ</div>
        <div style="display:flex;gap:3px">
          <button class="zb" style="background:var(--accent)" onclick="chFS('date',5)">+</button>
          <button class="zb" style="background:#2a2a3a" onclick="chFS('date',-5)">−</button>
        </div>
      </div>
      <div style="text-align:center">
        <div style="font-size:10px;color:var(--sub);margin-bottom:4px">الفجوة</div>
        <div style="display:flex;gap:3px">
          <button class="zb" style="background:var(--accent)" onclick="chDG(10)">+</button>
          <button class="zb" style="background:#2a2a3a" onclick="chDG(-10)">−</button>
        </div>
      </div>
    </div>
    <div class="row" style="margin-top:5px">
      <select class="btn" onchange="applyFont(this.value)" style="font-size:10px">
        <option value="" disabled selected>خط الاسم</option>
        <option value="F0">افتراضي</option><option value="F1">Hand Write</option>
        <option value="F3">Modern Light</option><option value="F4">Modern</option>
        <option value="F5">Bold</option><option value="F6">Classic</option>
      </select>
      <select class="btn" onchange="applyDFont(this.value)" style="font-size:10px">
        <option value="" disabled selected>خط التاريخ</option>
        <option value="F0">افتراضي</option><option value="F1">Hand Write</option>
        <option value="F3">Modern Light</option><option value="F4">Modern</option>
        <option value="F5">Bold</option><option value="F6">Classic</option>
      </select>
    </div>
    <div class="row"><label class="btn bdark bx" style="cursor:pointer">رفع خط<input type="file" hidden accept=".ttf,.otf" onchange="upFont(event)"></label></div>
    <div class="card">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:7px">
        <span class="card-title" style="margin:0">📅 تاريخ إضافي</span>
        <button id="d2btn" onclick="toggleD2()" style="background:#0d3a1a;border:1px solid #2a6a2a;color:#5dde9a;padding:4px 10px;border-radius:6px;font-family:inherit;font-size:10px;cursor:pointer">تفعيل</button>
      </div>
      <div id="d2ctrl" style="display:none">
        <div class="row">
          <button class="btn bx" onclick="tvEl('txt-date2')">ميلادي</button>
          <button class="btn bx" onclick="tvEl('txt-hijri2')">هجري</button>
        </div>
        <div style="display:flex;gap:5px;align-items:center;flex-wrap:wrap">
          <span style="font-size:10px;color:var(--sub)">حجم:</span>
          <button class="zb" style="background:var(--accent)" onclick="chD2S(5)">+</button>
          <button class="zb" style="background:#2a2a3a" onclick="chD2S(-5)">−</button>
          <span id="d2sv" style="font-size:10px;color:var(--text)">62px</span>
          <span style="font-size:10px;color:var(--sub);margin-right:6px">فجوة:</span>
          <button class="zb" style="background:#2a2a3a" onclick="chD2G(10)">+</button>
          <button class="zb" style="background:#2a2a3a" onclick="chD2G(-10)">−</button>
        </div>
        <div style="display:flex;gap:4px;align-items:center;margin-top:6px">
          <span style="font-size:10px;color:var(--sub)">موقع:</span>
          <button class="dp" onclick="mvD2(0,-20)">▲</button>
          <button class="dp" onclick="mvD2(0,20)">▼</button>
          <button class="dp" onclick="mvD2(-20,0)">◀</button>
          <button class="dp" onclick="mvD2(20,0)">▶</button>
        </div>
      </div>
    </div>
  </div>

  <!-- ④ شعارات -->
  <div id="pg-wm" class="pg">
    <div class="row">
      <button class="btn bx" onclick="twm('wm1')">إظهار/إخفاء شعار 1</button>
      <button class="btn bx" onclick="twm('wm2')">إظهار/إخفاء شعار 2</button>
    </div>
    <div class="row">
      <button class="btn bx" onclick="tvEl('txt-date')">ميلادي</button>
      <button class="btn bx" onclick="tvEl('txt-hijri')">هجري</button>
    </div>
    <div style="font-size:10px;color:var(--sub);margin-bottom:5px">لون شعار 1:</div>
    <div class="row">
      <button class="btn bx" style="background:#fff;color:#000" onclick="setWC('wm1','white')">أبيض</button>
      <button class="btn bx" style="background:#111" onclick="setWC('wm1','black')">أسود</button>
      <button class="btn bx" onclick="setWC('wm1','original')">أصلي</button>
    </div>
    <div style="font-size:10px;color:var(--sub);margin-bottom:5px">لون شعار 2:</div>
    <div class="row">
      <button class="btn bx" style="background:#fff;color:#000" onclick="setWC('wm2','white')">أبيض</button>
      <button class="btn bx" style="background:#111" onclick="setWC('wm2','black')">أسود</button>
      <button class="btn bx" onclick="setWC('wm2','original')">أصلي</button>
    </div>
  </div>

  <!-- ⑤ فلتر -->
  <div id="pg-fx" class="pg">
    <div class="row">
      <button class="btn bdark bx" onclick="applyBW(true)">⬛ أبيض وأسود</button>
      <button class="btn bx" onclick="applyBW(false)">🎨 استعادة</button>
      <button class="btn bblue bx" onclick="flipBg()">↔ Flip</button>
    </div>
    <div class="slrow">
      <span class="sllabel">كونتراست</span>
      <input type="range" id="bw-contrast" min="50" max="250" value="100" oninput="updBW()">
      <span class="slval" id="bwc-val">100%</span>
    </div>
    <div class="slrow">

// ── BG Canvas drawing ──
let _bgImg=null,_bgFlip=false;
function drawBg(removeBg){
  if(removeBg===undefined)removeBg=window._bgRm===true;
  if(!_bgImg)return;
  const W=1083,H=1500;
  if(bgCv.width!==W||bgCv.height!==H){bgCv.width=W;bgCv.height=H;}
  bgCv.style.width='100%';bgCv.style.height='100%';
  bgEl.style.backgroundImage='none';bgCv.style.display='block';
  const ctx=bgCv.getContext('2d');ctx.clearRect(0,0,W,H);
  const ir=_bgImg.naturalWidth/_bgImg.naturalHeight,cr=W/H;
  let sx=0,sy=0,sw2=_bgImg.naturalWidth,sh2=_bgImg.naturalHeight;
  if(ir>cr){sw2=sh2*cr;sx=(_bgImg.naturalWidth-sw2)/2;}else{sh2=sw2/cr;sy=(_bgImg.naturalHeight-sh2)/2;}
  const sc=cfg.bg.z/100,dW=W*sc,dH=H*sc;
  const dX=(W-dW)/2+(cfg.bg.panX||0),dY=(H-dH)/2+(cfg.bg.panY||0);
  function doDraw(c){
    if(_bgFlip){c.save();c.translate(W,0);c.scale(-1,1);}
    c.drawImage(_bgImg,sx,sy,sw2,sh2,dX,dY,dW,dH);
    if(_bgFlip)c.restore();
  }
  if(!removeBg){doDraw(ctx);return;}
  const off=document.createElement('canvas');off.width=W;off.height=H;
  const oc=off.getContext('2d');doDraw(oc);
  const thr=parseInt(document.getElementById('bg-remove-range').value);
  const idd=oc.getImageData(0,0,W,H);const dp=idd.data;
  let rS=0,gS=0,bS=0,n=0;
  [[0,0],[W-1,0],[0,H-1],[W-1,H-1],[W>>1,0],[0,H>>1],[W-1,H>>1],[W>>1,H-1]].forEach(([x,y])=>{
    const i=(y*W+x)*4;if(dp[i+3]>10){rS+=dp[i];gS+=dp[i+1];bS+=dp[i+2];n++;}
  });
  const br=n?rS/n:255,bg_=n?gS/n:255,bb_=n?bS/n:255,tol=(255-thr)*1.4;
  function isbg(i){if(dp[i+3]<10)return true;const r=dp[i],g=dp[i+1],b=dp[i+2];
    if(Math.sqrt((r-br)**2+(g-bg_)**2+(b-bb_)**2)<tol)return true;
    return(r*299+g*587+b*114)/1000>=thr&&Math.max(r,g,b)-Math.min(r,g,b)<40;}
  const vis=new Uint8Array(W*H),q=[];
  for(let x=0;x<W;x++)for(const py of[0,H-1]){const i=py*W+x;if(!vis[i]){if(isbg(i*4)){vis[i]=1;q.push(i);}else vis[i]=2;}}
  for(let y=1;y<H-1;y++)for(const px of[0,W-1]){const i=y*W+px;if(!vis[i]){if(isbg(i*4)){vis[i]=1;q.push(i);}else vis[i]=2;}}
  let h=0;while(h<q.length){const c=q[h++],cx=c%W,cy=c/W|0;
    if(cx>0){const nb=c-1;if(!vis[nb]){if(isbg(nb*4)){vis[nb]=1;q.push(nb);}else vis[nb]=2;}}
    if(cx<W-1){const nb=c+1;if(!vis[nb]){if(isbg(nb*4)){vis[nb]=1;q.push(nb);}else vis[nb]=2;}}
    if(cy>0){const nb=c-W;if(!vis[nb]){if(isbg(nb*4)){vis[nb]=1;q.push(nb);}else vis[nb]=2;}}
    if(cy<H-1){const nb=c+W;if(!vis[nb]){if(isbg(nb*4)){vis[nb]=1;q.push(nb);}else vis[nb]=2;}}}
  const af=new Float32Array(W*H),bl=new Float32Array(W*H);
  for(let i=0;i<W*H;i++)af[i]=vis[i]===1?0:1;
  for(let y=0;y<H;y++)for(let x=0;x<W;x++){let s=0,c=0;for(let dy=-2;dy<=2;dy++)for(let dx=-2;dx<=2;dx++){const nx=x+dx,ny=y+dy;if(nx>=0&&nx<W&&ny>=0&&ny<H){s+=af[ny*W+nx];c++;}}bl[y*W+x]=s/c;}
  for(let i=0;i<W*H;i++)dp[i*4+3]=Math.round(bl[i]*255);
  oc.putImageData(idd,0,0);ctx.drawImage(off,0,0);
}

// ── Overlay/toast helpers ──
function showOv(m,p){let ov=document.getElementById('_ov');if(!ov){ov=document.createElement('div');ov.id='_ov';ov.style.cssText='position:fixed;inset:0;background:rgba(0,0,0,.88);z-index:9999;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;font-family:inherit;direction:rtl';ov.innerHTML='<div style="font-size:32px">⏳</div><div id="_ovm" style="color:#fff;font-size:13px;text-align:center;max-width:250px;line-height:1.7"></div><div style="width:200px;height:4px;background:#222;border-radius:2px;overflow:hidden"><div id="_ovb" style="height:100%;background:#c9a84c;border-radius:2px;transition:width .4s;width:0%"></div></div>';document.body.appendChild(ov);}document.getElementById('_ovm').innerText=m;document.getElementById('_ovb').style.width=p+'%';}
function hideOv(){const o=document.getElementById('_ov');if(o)o.remove();}
function toast(m){const t=document.createElement('div');t.style.cssText='position:fixed;bottom:75px;left:50%;transform:translateX(-50%);background:#1a5c2a;color:#fff;padding:10px 20px;border-radius:10px;font-family:inherit;font-size:12px;z-index:9999;direction:rtl;white-space:nowrap';t.innerText=m;document.body.appendChild(t);setTimeout(()=>t.remove(),2800);}

// ── Save ──
async function doSave(){
  const btn=document.getElementById('save-btn');btn.innerText='⏳ جاري...';
  const oldT=sw.style.transform;sw.style.transform='none';
  const oldF=dc.style.filter;
  const contrast=document.getElementById('bw-contrast').value;
  const brightness=document.getElementById('bw-brightness').value;
  dc.style.filter='none';
  try{
    // WM canvases are already base64 inside the DOM — html2canvas reads them directly
    // No visibility tricks needed — canvases render correctly
    // html2canvas مع allowTaint:true يرسم الشعارات مباشرة
    const c=await html2canvas(dc,{useCORS:true,scale:2,allowTaint:true,logging:false});
    let fc=c;
    if(bwOn||parseFloat(contrast)!==100||parseFloat(brightness)!==100){
      fc=document.createElement('canvas');fc.width=c.width;fc.height=c.height;
      const fctx=fc.getContext('2d');
      fctx.filter=bwOn?`grayscale(100%) contrast(${contrast}%) brightness(${brightness}%)`:`contrast(${contrast}%) brightness(${brightness}%)`;
      fctx.drawImage(c,0,0);
    }
    const isIOS=/iPad|iPhone|iPod/.test(navigator.userAgent)&&!window.MSStream;
    if(isIOS){fc.toBlob(blob=>{const url=URL.createObjectURL(blob);const tab=window.open(url,'_blank');if(!tab){const img=document.createElement('img');img.src=fc.toDataURL();img.style.cssText='position:fixed;inset:0;width:100%;z-index:9999;background:#000;object-fit:contain';document.body.appendChild(img);alert('اضغط مطولاً ثم حفظ الصورة');img.onclick=()=>img.remove();}else alert('اضغط مطولاً ثم حفظ الصورة');},'image/png');}
    else{fc.toBlob(blob=>{const u=URL.createObjectURL(blob);const l=document.createElement('a');l.href=u;l.download='Obituary_'+Date.now()+'.png';l.click();},'image/png');}
  }catch(e){alert('فشل: '+e.message);}
  dc.style.filter=oldF;sw.style.transform=oldT;btn.innerText='💾 تحميل التصميم';scaleUI();
}

// ── Fullscreen ──
function goFS(){const vp=document.querySelector('.vp');if(/iPad|iPhone|iPod/.test(navigator.userAgent)&&!window.MSStream){vp.classList.toggle('ifs');document.body.classList.toggle('ifb');setTimeout(scaleUI,50);return;}if(!document.fullscreenElement&&!document.webkitFullscreenElement){(vp.requestFullscreen||vp.webkitRequestFullscreen).call(vp);}else{(document.exitFullscreen||document.webkitExitFullscreen).call(document);}}
document.addEventListener('fullscreenchange',scaleUI);
document.addEventListener('webkitfullscreenchange',scaleUI);

window.onload=()=>{
  setMode('man');window.onresize=scaleUI;
  // تحميل الشعارات كـ blob URLs لتجنب CORS في الحفظ
  ['wm-app','wm-yearly'].forEach(id=>{
    const el=document.getElementById(id);if(!el)return;
    const origSrc=el.src;
    fetch(origSrc).then(r=>r.blob()).then(b=>{
      el.src=URL.createObjectURL(b);
    }).catch(()=>{}); // إذا فشل يبقى الـ src الأصلي
  });
};
